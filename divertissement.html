<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="icon" type="image/jpeg" href="Image/photo.JPEG">

    <!-- Open Graph (CORRIGÉ ICI) -->
    <meta property="og:type" content="website">
    <!-- Ici on met l'adresse de ton site Netlify -->
    <meta property="og:url" content="https://kabela-mike.netlify.app/projets"> 
    <meta property="og:title" content="Portfolio de Mike Kabela">
    <meta property="og:description" content="Nous créons des solutions innovantes pour booster vos activités.">
    <!-- Ici on met le lien DIRECT vers la photo -->
    <meta property="og:image" content="https://github.com/Sarcelle007/Mon-portfolio-2026/blob/main/Image/photo.JPEG?raw=true">

    <!-- Twitter Card (CORRIGÉ ICI) -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Portfolio de Mike Kabela">
    <meta name="twitter:description" content="Solutions innovantes pour booster vos activités.">
    <meta name="twitter:image" content="https://github.com/Sarcelle007/Mon-portfolio-2026/blob/main/Image/photo.JPEG?raw=true">

    <!-- Fichier CSS -->

    <link rel="stylesheet" href="css/style.css">
    <title>Mon portefolio - Divertissement</title>
</head>
<body>
    <header>
        <div>
            <a href="#">Mon Portfolio</a>
        </div>
        <!-- Nouveau bouton hamburger -->
        <div class="menu-toggle" id="mobile-menu">
            <i class="fa-solid fa-bars"></i>
        </div>
        <nav>
            <ul class="nav-list">
                <li><a href="Index.html">Acceuill</a></li>
                <li><a href="projets.html">Projets</a></li>
                <li><a href="passion.html">Passions</a></li>
                <li><a href="divertissement.html" class="active">Divertissement</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
    
    <section>
        <div>
            <h2>Mes divertissements</h2>
        </div>

        <div class="content">
            <!-- Remplacement de l'emoji par l'icône Font Awesome -->
            <div class="crane-icon">
                <i class="fa-solid fa-trowel-bricks"></i> <!-- Icône de construction -->
            </div>
            
            <h1>Site en travaux</h1>
            <p>Le contenu arrive bientôt.</p>
        </div>
    </section>


    <footer>
        <p>© 2026 Mike Kabela — Tous droits réservés</p>
        <i class="fa-brands fa-github"></i>
        <i class="fa-brands fa-x-twitter"></i>
        <i class="fa-brands fa-google"></i>
    </footer>

    <<script>
        const menuToggle = document.getElementById('mobile-menu');
        const navList = document.querySelector('.nav-list');

        menuToggle.addEventListener('click', () => {
            // Cela va déclencher l'animation CSS max-height et opacity
            navList.classList.toggle('active');
            
            // Change l'icône
            const icon = menuToggle.querySelector('i');
            icon.classList.toggle('fa-bars');
            icon.classList.toggle('fa-xmark');
        });
    </script>
</body>
</html>
